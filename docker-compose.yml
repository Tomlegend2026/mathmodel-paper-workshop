version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mathmodel-postgres
    environment:
      POSTGRES_DB: mathmodel
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: dev123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mathmodel"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  postgres_data: